<!doctype html>

  <body class="page-sellers">
    <header class="site-header" aria-label="Site header">
      <div class="site-header__inner">
        <a href="/castia-market-dev-build/" class="logo" aria-label="Castia Market home">
          <div class="logo-mark" aria-hidden="true">
            <svg
              width="13"
              height="13"
              viewBox="0 0 14 14"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M7 1.5L8.8 5.2L13 5.8L10 8.7L10.7 12.8L7 10.8L3.3 12.8L4 8.7L1 5.8L5.2 5.2Z"
              />
            </svg>
          </div>
          <div class="logo-wordmark">
            <span class="logo-name">CASTIA</span
            ><span class="logo-tag">MARKET</span>
          </div>
        </a>
        <nav class="site-header__nav" aria-label="Main navigation">
          <a href="/castia-market-dev-build/" class="site-header__nav-link">
            <svg
              width="11"
              height="11"
              viewBox="0 0 12 12"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              aria-hidden="true"
            >
              <rect x="1" y="1" width="10" height="2.5" rx=".75" />
              <rect x="1" y="5" width="10" height="2.5" rx=".75" />
              <rect x="1" y="9" width="10" height="2" rx=".75" />
            </svg>
            Listings
          </a>
          <a href="/castia-market-dev-build/sellers/" class="site-header__nav-link active">
            <svg
              width="11"
              height="11"
              viewBox="0 0 12 12"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              aria-hidden="true"
            >
              <circle cx="6" cy="4" r="2.5" />
              <path d="M1.5 11c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" />
            </svg>
            Sellers
          </a>
          <span class="site-header__nav-link nav-soon" aria-disabled="true">
            <svg
              width="11"
              height="11"
              viewBox="0 0 12 12"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              aria-hidden="true"
            >
              <circle cx="6" cy="6" r="4.5" />
              <path d="M6 3.5v3l2 1.5" />
            </svg>
            Coming Soon
          </span>
        </nav>
        <div class="header-right">
          <div id="sync-status">
            <div class="dot loading" id="sdot"></div>
            <span id="stxt">Loading...</span>
          </div>
          <button
            class="hbtn mob-menu-btn"
            id="mobMenuBtn"
            aria-label="Toggle navigation"
            aria-expanded="false"
            aria-controls="mob-nav"
            data-action="toggle-mobile-menu"
          >
            <div class="burger-line burger-line-1"></div>
            <div class="burger-line burger-line-2"></div>
            <div class="burger-line burger-line-3"></div>
          </button>
        </div>
      </div>
      <nav
        class="mob-nav"
        id="mob-nav"
        aria-hidden="true"
        aria-label="Mobile navigation"
      >
        <a href="/castia-market-dev-build/" class="mob-nav__link" data-action="close-mobile-menu">
          <svg
            width="13"
            height="13"
            viewBox="0 0 12 12"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            aria-hidden="true"
          >
            <rect x="1" y="1" width="10" height="2.5" rx=".75" />
            <rect x="1" y="5" width="10" height="2.5" rx=".75" />
            <rect x="1" y="9" width="10" height="2" rx=".75" />
          </svg>
          Listings
        </a>
        <a
          href="/castia-market-dev-build/sellers/"
          class="mob-nav__link active"
          data-action="close-mobile-menu"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 12 12"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            aria-hidden="true"
          >
            <circle cx="6" cy="4" r="2.5" />
            <path d="M1.5 11c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" />
          </svg>
          Sellers
        </a>
        <span class="mob-nav__link nav-soon" aria-disabled="true">
          <svg
            width="13"
            height="13"
            viewBox="0 0 12 12"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            aria-hidden="true"
          >
            <circle cx="6" cy="6" r="4.5" />
            <path d="M6 3.5v3l2 1.5" />
          </svg>
          Coming Soon
        </span>
      </nav>
    </header>

    <!-- THE SELLER PANEL -->
    <div
      id="seller-panel-backdrop"
      aria-hidden="true"
      data-action="close-seller-panel"
    ></div>
    <div
      id="seller-panel"
      role="dialog"
      aria-modal="true"
      aria-label="Seller details"
      aria-hidden="true"
      tabindex="-1"
    >
      <div class="panel-header">
        <div class="panel-top">
          <div class="panel-seller-info">
            <div class="panel-avatar" id="seller-panel-avatar">
              <img
                src=""
                alt=""
                id="seller-panel-avatar-img"
                class="is-hidden"
              />
              <span id="seller-panel-avatar-fallback">—</span>
            </div>
            <div class="panel-seller-details">
              <div class="panel-seller-name" id="seller-panel-title">—</div>
              <div class="panel-seller-badges" id="seller-panel-badges"></div>
            </div>
          </div>
          <button
            type="button"
            class="panel-close"
            aria-label="Close seller details"
            data-action="close-seller-panel"
          >
            ✕
          </button>
        </div>
      </div>
      <div class="panel-body" id="seller-panel-body"></div>
    </div>

    <div id="app">
      <main>
        <div class="sellers-hero">
          <div class="sellers-hero__label">Directory</div>
          <h1 class="sellers-hero__title">Auction <span>Sellers</span></h1>
          <p class="sellers-hero__sub">
            Reputation scores based on pricing accuracy.<br>Click any card to see
            history.
          </p>
        </div>

        <div class="sellers-toolbar">
          <div class="sellers-toolbar__search">
            <svg
              width="13"
              height="13"
              viewBox="0 0 14 14"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="6" cy="6" r="4.5" />
              <line x1="9.5" y1="9.5" x2="13" y2="13" />
            </svg>
            <input
              type="text"
              id="qEl"
              placeholder="Search sellers…"
              data-action="filter-sellers"
            />
          </div>
          <div class="sellers-toolbar__filter">
            <button class="sf-btn on" id="sf-all" data-action="set-seller-filter" data-filter="all">
              All
            </button>
            <button
              class="sf-btn"
              id="sf-trustworthy"
              data-action="set-seller-filter" data-filter="trustworthy"
            >
              ✓ Trustworthy
            </button>
            <button class="sf-btn" id="sf-neutral" data-action="set-seller-filter" data-filter="neutral">
              ⊙ Neutral
            </button>
            <button
              class="sf-btn"
              id="sf-suspicious"
              data-action="set-seller-filter" data-filter="suspicious"
            >
              ⚠ Suspicious
            </button>
            <button class="sf-btn" id="sf-flagged" data-action="set-seller-filter" data-filter="flagged">
              ✕ Flagged
            </button>
          </div>
          <span class="sellers-count" id="sellersCount"></span>
        </div>

        <div class="sellers-grid" id="sellersGrid" aria-live="polite"></div>
      </main>
    </div>

    <footer>Castia Market &mdash; auto-refreshes every 5 min</footer>
    <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    <button
      id="scrollTopBtn"
      data-action="scroll-top"
      title="Back to top"
      aria-label="Back to top"
    >
      <svg
        width="12"
        height="12"
        viewBox="0 0 12 12"
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
      >
        <polyline points="2,8 6,4 10,8" />
      </svg>
    </button>

    
    <script defer src="../assets/js/pages/sellers-entry.js?v=20260514a"></script>
</body>
</html>
